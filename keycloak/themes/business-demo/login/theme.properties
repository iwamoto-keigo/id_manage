parent=keycloak.v2
import=common/keycloak

# Inherit the parent theme's CSS (resolved through the inheritance chain)
# and load our override on top. Keycloak v2 ships css/styles.css; we list
# css/login.css as a harmless fallback for older v1-based Keycloak setups
# (missing files in the chain are skipped).
styles=css/login.css css/styles.css css/custom.css

kcHtmlClass=login-pf bd-login
